  /api/dashboard/aktif:
    get:
      tags: [Dashboard]
      summary: Dashboard Aktif per role
      description: |
        Menampilkan surat yang masih membutuhkan tindakan role login.
        Endpoint ini tidak mendukung filter tanggal.

        Aturan:
        - TU: surat yang sudah diverifikasi Kepsek dan masih perlu dikonfirmasi TU.
        - Kepsek: surat masuk/keluar dengan status `MENUNGGU_PERSETUJUAN_KEPSEK`.
        - Waka: surat masuk yang dikirim ke Waka dan belum diteruskan ke User oleh Waka tersebut.
        - User: surat masuk yang dikirim ke User dan belum dikonfirmasi penerimaannya.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Daftar surat aktif role login.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DashboardListData'
              example:
                success: true
                message: Data berhasil diambil
                data:
                  items:
                    - id: 1
                      jenis_surat: surat_masuk
                      no_surat: 001/SMK/VI/2026
                      perihal: Undangan rapat
                      asal_surat: Dinas Pendidikan
                      status: DIKIRIM_KE_USER
                      status_verifikasi: DISETUJUI_KEPSEK
                      status_alur: DIKIRIM_KE_USER
                      tanggal_surat: '2026-06-09'
                      preview_url: http://192.168.0.105:7000/uploads/previews/masuk_1/page_1.png
                      created_at: '2026-06-09T10:00:00Z'
                  total: 1
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/riwayat:
    get:
      tags: [Dashboard]
      summary: Dashboard Riwayat per role
      description: |
        Menampilkan surat yang tugas role login sudah selesai.
        Riwayat per role bersifat independen dan tidak menunggu surat selesai secara global.

        Filter tanggal hanya tersedia pada endpoint ini dan menggunakan `tanggal_surat`, bukan `created_at`.
      security:
        - BearerAuth: []
      parameters:
        - name: filter
          in: query
          required: false
          schema:
            type: string
            enum: [hari_ini, minggu_ini, bulan_ini]
          description: Filter cepat berdasarkan tanggal_surat.
          example: hari_ini
        - name: tanggal
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter tanggal tertentu berdasarkan tanggal_surat. Format YYYY-MM-DD.
          example: '2026-06-09'
      responses:
        '200':
          description: Daftar riwayat role login.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DashboardListData'
              example:
                success: true
                message: Data berhasil diambil
                data:
                  items:
                    - id: 1
                      jenis_surat: surat_masuk
                      no_surat: 001/SMK/VI/2026
                      perihal: Undangan rapat
                      asal_surat: Dinas Pendidikan
                      status: DIKIRIM_KE_USER
                      status_verifikasi: DISETUJUI_KEPSEK
                      status_alur: DIKIRIM_KE_USER
                      tanggal_surat: '2026-06-09'
                      role_riwayat: waka
                      created_at: '2026-06-09T10:00:00Z'
                  total: 1
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

