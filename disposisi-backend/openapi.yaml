  /api/surat-keluar:
    get:
      tags: [Surat Keluar]
      summary: List Surat Keluar
      description: Untuk kebutuhan Riwayat Surat Keluar, gunakan filter `status` sesuai status final.
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/SuratStatusKeluar'
        - name: tanggal_awal
          in: query
          schema:
            type: string
            format: date
        - name: tanggal_akhir
          in: query
          schema:
            type: string
            format: date
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Daftar surat keluar.
          content:
            application/json:
              example:
                success: true
                message: Data berhasil diambil
                data: []
    post:
      tags: [Surat Keluar]
      summary: Upload Surat Keluar
      description: "Role: TU. Status awal `MENUNGGU_PERSETUJUAN_KEPSEK`."
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [kode_surat, no_surat, perihal, tanggal_surat, file]
              properties:
                kode_surat:
                  type: integer
                  example: 1
                no_surat:
                  type: string
                  maxLength: 50
                  pattern: .*/.*
                  example: 001/SMK/VI/2026
                perihal:
                  type: string
                catatan:
                  type: string
                tanggal_surat:
                  type: string
                  format: date
                tujuan:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Surat keluar berhasil diupload.
          content:
            application/json:
              example:
                success: true
                message: Surat keluar berhasil diupload
                data:
                  id: 1
                  status: MENUNGGU_PERSETUJUAN_KEPSEK
        '400':
          $ref: '#/components/responses/BadRequest'

