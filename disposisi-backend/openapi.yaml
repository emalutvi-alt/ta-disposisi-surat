openapi: 3.1.0

info:
  title: Disposisi Surat Sekolah API
  version: 1.1.0
  description: |
    Dokumentasi API sinkron dengan route backend terbaru.

    ## Format Response
    Sukses:
    ```json
    { "success": true, "message": "Data berhasil diambil", "data": {} }
    ```

    Gagal:
    ```json
    { "success": false, "message": "Pesan error" }
    ```

    ## Role Access Matrix
    | Role | Akses utama |
    |------|-------------|
    | `tu` | Upload surat, membaca hasil verifikasi, konfirmasi TU, memilih Waka |
    | `kepsek` | Approve dan reject surat |
    | `users` sebagai Waka | Membaca catatan Kepsek dan mengirim surat masuk ke penerima |
    | `users` sebagai penerima | Membaca surat yang ditujukan kepadanya dan konfirmasi penerimaan |

    ## Status Surat Masuk
    `MENUNGGU_PERSETUJUAN_KEPSEK` -> `DITOLAK_KEPSEK` -> `SELESAI`

    atau

    `MENUNGGU_PERSETUJUAN_KEPSEK` -> `DISETUJUI_KEPSEK` -> `DIKIRIM_KE_WAKA` -> `DIKIRIM_KE_USER` -> `DITERIMA_USER` -> `SELESAI`

    ## Status Surat Keluar
    `MENUNGGU_PERSETUJUAN_KEPSEK` -> `DITOLAK_KEPSEK` -> `SELESAI`

    atau

    `MENUNGGU_PERSETUJUAN_KEPSEK` -> `DISETUJUI_KEPSEK` -> `SELESAI`

    ## Validasi Nomor Surat
    Nomor surat wajib mengandung `/` dan maksimal 50 karakter.
    Contoh valid: `001/SMK/VI/2026`.
    Contoh invalid: `001SMK2026`.

    ## Upload dan Preview
    Upload surat menggunakan `multipart/form-data`.
    Format file yang didukung: PDF, JPG, JPEG, PNG.
    PDF asli tidak didokumentasikan untuk download. Client hanya boleh download image preview.

servers:
  - url: http://192.168.0.104:7000
    description: Local dev
  - url: http://10.0.2.2:7000
    description: Android Emulator

tags:
  - name: Auth
  - name: Surat Masuk
  - name: Surat Keluar
  - name: Preview
  - name: Dashboard
  - name: Notifikasi
  - name: Users
  - name: Audit Log

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1
    Page:
      name: page
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      example: 1

  schemas:
    SuccessEnvelope:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Data berhasil diambil
        data: {}

    ErrorEnvelope:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Email tidak ditemukan
        errors:
          type:
            - object
            - 'null'

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: dummy_kepsek@gmail.com
        password:
          type: string
          example: Admin1234

    LoginUser:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nama:
          type: string
          example: Kepala Sekolah
        email:
          type: string
          format: email
        role:
          type: string
          enum: [tu, kepsek, users]

    LoginData:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: '#/components/schemas/LoginUser'

    ProfileData:
      type: object
      properties:
        id:
          type: integer
        nama:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [tu, kepsek, users]
        jabatan:
          type: string

    EmailRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    VerifyOTPRequest:
      type: object
      required: [email, otp]
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          minLength: 6
          maxLength: 6
          example: "123456"

    ResetPasswordRequest:
      type: object
      required: [email, new_password, confirm_password]
      properties:
        email:
          type: string
          format: email
        reset_token:
          type: string
        new_password:
          type: string
          minLength: 8
        confirm_password:
          type: string
          minLength: 8

    ChangePasswordRequest:
      type: object
      required: [old_password, new_password, confirm_password]
      properties:
        old_password:
          type: string
        new_password:
          type: string
          minLength: 8
        confirm_password:
          type: string
          minLength: 8

    SuratStatusMasuk:
      type: string
      enum:
        - MENUNGGU_PERSETUJUAN_KEPSEK
        - DITOLAK_KEPSEK
        - DISETUJUI_KEPSEK
        - DIKIRIM_KE_WAKA
        - DIKIRIM_KE_USER
        - DITERIMA_USER
        - SELESAI

    SuratStatusKeluar:
      type: string
      enum:
        - MENUNGGU_PERSETUJUAN_KEPSEK
        - DITOLAK_KEPSEK
        - DISETUJUI_KEPSEK
        - SELESAI

    PDFPage:
      type: object
      properties:
        page_number:
          type: integer
          example: 1
        image_url:
          type: string
          example: http://192.168.0.105:7000/uploads/previews/masuk_1/page_1.png

    SuratMasuk:
      type: object
      properties:
        id:
          type: integer
        no_surat:
          type: string
          maxLength: 50
          pattern: .*/.*
          example: 001/SMK/VI/2026
        perihal:
          type: string
        asal_surat:
          type: string
        status:
          $ref: '#/components/schemas/SuratStatusMasuk'
        status_verifikasi:
          $ref: '#/components/schemas/SuratStatusMasuk'
        status_alur:
          $ref: '#/components/schemas/SuratStatusMasuk'
        preview_url:
          type: string
        total_pages:
          type: integer
        pages:
          type: array
          items:
            $ref: '#/components/schemas/PDFPage'
        created_at:
          type: string
          format: date-time

    SuratKeluar:
      type: object
      properties:
        id:
          type: integer
        kode_surat:
          type: integer
        no_surat:
          type: string
          maxLength: 50
          pattern: .*/.*
          example: 001/SMK/VI/2026
        perihal:
          type: string
        tujuan:
          type: string
        status:
          $ref: '#/components/schemas/SuratStatusKeluar'
        status_verifikasi:
          $ref: '#/components/schemas/SuratStatusKeluar'
        status_alur:
          $ref: '#/components/schemas/SuratStatusKeluar'
        preview_url:
          type: string
        total_pages:
          type: integer
        pages:
          type: array
          items:
            $ref: '#/components/schemas/PDFPage'
        created_at:
          type: string
          format: date-time

    VerifikasiRequest:
      type: object
      required: [is_approved]
      properties:
        is_approved:
          type: boolean
          example: true
        catatan:
          type: string
          description: Wajib diisi jika reject.
          example: Surat belum sesuai
        tujuan_ids:
          type: array
          items:
            type: integer
        tanggapan_saran:
          type: string
        proses_lanjut:
          type: string
        koordinasi_konfirmasi:
          type: string

    UnifiedDisposisiRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [disetujui, ditolak]
        catatan:
          type: string
          description: Wajib diisi jika status ditolak.
        tujuan:
          type: array
          items:
            type: string
        tanggapan_saran:
          type: string
        proses_lanjut:
          type: string
        koordinasi_konfirmasi:
          type: string

    KonfirmasiTUSuratMasukRequest:
      type: object
      properties:
        waka_ids:
          type: array
          items:
            type: integer
          example: [3]

    KirimKeUserRequest:
      type: object
      required: [user_ids, catatan]
      properties:
        user_ids:
          type: array
          minItems: 1
          items:
            type: integer
          example: [7, 8]
        catatan:
          type: string
          example: Mohon ditindaklanjuti

    Notification:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        message:
          type: string
        type:
          type: string
        is_read:
          type: boolean
        reference_id:
          type: integer
        created_at:
          type: string
          format: date-time

    AuditLog:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type:
            - integer
            - 'null'
        action:
          type: string
        table:
          type: string
        record_id:
          type:
            - integer
            - 'null'
        old_value:
          type: string
        new_value:
          type: string
        created_at:
          type: string
          format: date-time

    DashboardSuratItem:
      type: object
      properties:
        id:
          type: integer
          example: 1
        jenis_surat:
          type: string
          enum: [surat_masuk, surat_keluar]
          example: surat_masuk
        no_surat:
          type: string
          example: 001/SMK/VI/2026
        perihal:
          type: string
          example: Undangan rapat
        asal_surat:
          type: string
          example: Dinas Pendidikan
        tujuan:
          type: string
          example: Komite Sekolah
        status:
          type: string
          example: DIKIRIM_KE_USER
        status_verifikasi:
          type: string
          example: DISETUJUI_KEPSEK
        status_alur:
          type: string
          example: DIKIRIM_KE_USER
        tanggal_surat:
          type: string
          format: date
          example: '2026-06-09'
        preview_url:
          type: string
          example: http://192.168.0.105:7000/uploads/previews/masuk_1/page_1.png
        role_riwayat:
          type: string
          enum: [tu, waka, user]
          example: waka
        created_at:
          type: string
          format: date-time

    DashboardListData:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DashboardSuratItem'
        total:
          type: integer
          example: 1

  responses:
    Unauthorized:
      description: JWT tidak valid atau tidak dikirim.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            message: Akses tidak sah
    BadRequest:
      description: Request tidak valid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Data tidak ditemukan.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

paths:
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Memvalidasi email dan password lalu mengembalikan JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              login:
                value:
                  email: dummy_kepsek@gmail.com
                  password: Admin1234
      responses:
        '200':
          description: Login berhasil.
          content:
            application/json:
              example:
                success: true
                message: login berhasil
                data:
                  token: eyJhbGciOiJIUzI1NiIs...
                  user:
                    id: 1
                    nama: Kepala Sekolah
                    email: dummy_kepsek@gmail.com
                    role: kepsek
        '400':
          description: Email tidak ditemukan atau password salah.
          content:
            application/json:
              examples:
                emailTidakDitemukan:
                  value:
                    success: false
                    message: Email tidak ditemukan
                passwordSalah:
                  value:
                    success: false
                    message: Password salah

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Kirim OTP reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '200':
          description: OTP dikirim.
          content:
            application/json:
              example:
                success: true
                message: OTP berhasil dikirim
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/auth/resend-otp:
    post:
      tags: [Auth]
      summary: Kirim ulang OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '200':
          description: OTP dikirim ulang.
          content:
            application/json:
              example:
                success: true
                message: OTP berhasil dikirim ulang
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verifikasi OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOTPRequest'
      responses:
        '200':
          description: OTP valid.
          content:
            application/json:
              example:
                success: true
                message: OTP valid
                data:
                  reset_token: reset-token
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password berhasil direset.
          content:
            application/json:
              example:
                success: true
                message: Password berhasil direset
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/profile:
    get:
      tags: [Auth]
      summary: Profil user login
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Data profil.
          content:
            application/json:
              example:
                success: true
                message: Data berhasil diambil
                data:
                  id: 1
                  nama: Tata Usaha
                  email: tu@sekolah.id
                  role: tu
                  jabatan: Tata Usaha
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/change-password:
    post:
      tags: [Auth]
      summary: Ganti password
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password berhasil diubah.
          content:
            application/json:
              example:
                success: true
                message: Password berhasil diubah
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/logout:
    post:
      tags: [Auth]
      summary: Logout
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logout berhasil.
          content:
            application/json:
              example:
                success: true
                message: logout berhasil

  /api/surat-masuk:
    get:
      tags: [Surat Masuk]
      summary: List Surat Masuk
      description: |
        Role: TU, Kepsek, Waka, User sesuai filter/permission service.
        Untuk kebutuhan Riwayat Surat Masuk, gunakan filter `status` sesuai status final.
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/SuratStatusMasuk'
        - name: tanggal_awal
          in: query
          schema:
            type: string
            format: date
        - name: tanggal_akhir
          in: query
          schema:
            type: string
            format: date
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Daftar surat masuk.
          content:
            application/json:
              example:
                success: true
                message: Data berhasil diambil
                data:
                  - id: 1
                    no_surat: 001/SMK/VI/2026
                    perihal: Undangan rapat
                    asal_surat: Dinas Pendidikan
                    status: MENUNGGU_PERSETUJUAN_KEPSEK
                    preview_url: http://192.168.0.105:7000/uploads/previews/masuk_1/page_1.png
                    total_pages: 1
                    pages: []
                    created_at: '2026-06-09T10:00:00Z'
    post:
      tags: [Surat Masuk]
      summary: Upload Surat Masuk
      description: |
        Role: TU.
        File wajib PDF/JPG/JPEG/PNG. Status awal: `MENUNGGU_PERSETUJUAN_KEPSEK`.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [no_surat, perihal_surat, asal_surat, tanggal_surat, file]
              properties:
                no_surat:
                  type: string
                  maxLength: 50
                  pattern: .*/.*
                  example: 001/SMK/VI/2026
                perihal_surat:
                  type: string
                  example: Undangan rapat
                asal_surat:
                  type: string
                  example: Dinas Pendidikan
                tanggal_surat:
                  type: string
                  format: date
                  example: '2026-06-09'
                file:
                  type: string
                  format: binary
                  description: PDF, JPG, JPEG, atau PNG.
      responses:
        '200':
          description: Surat masuk berhasil diupload.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/surat-masuk/{id}:
    get:
      tags: [Surat Masuk]
      summary: Detail Surat Masuk
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Detail surat masuk.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SuratMasuk'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/surat-masuk/{id}/verifikasi:
    post:
      tags: [Surat Masuk]
      summary: Approve atau Reject Surat Masuk oleh Kepsek
      description: "Role: Kepsek. Jika reject, `catatan` wajib."
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifikasiRequest'
            examples:
              approve:
                value:
                  is_approved: true
                  catatan: Silakan ditindaklanjuti
              reject:
                value:
                  is_approved: false
                  catatan: Surat belum sesuai
      responses:
        '200':
          description: Verifikasi diproses.
          content:
            application/json:
              example:
                success: true
                message: Verifikasi surat berhasil diproses
                data:
                  id: 1
                  status: DISETUJUI_KEPSEK
        '400':
          description: Catatan Kepsek wajib jika reject.
          content:
            application/json:
              example:
                success: false
                message: Catatan Kepala Sekolah wajib diisi

  /api/surat-masuk/{id}/disposisi:
    post:
      tags: [Surat Masuk]
      summary: Verifikasi terpadu Surat Masuk
      description: Route backend yang ada untuk proses Kepsek. Bukan endpoint `/disposisi` standalone.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnifiedDisposisiRequest'
      responses:
        '200':
          description: Proses berhasil.
          content:
            application/json:
              example:
                success: true
                message: disposisi berhasil diproses
                data:
                  id_surat: 1
                  status: DISETUJUI_KEPSEK
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/surat-masuk/{id}/konfirmasi-tu:
    post:
      tags: [Surat Masuk]
      summary: Konfirmasi TU Surat Masuk
      description: |
        Role: TU.
        Jika surat ditolak Kepsek, konfirmasi mengubah status ke `SELESAI`.
        Jika disetujui, TU wajib memilih `waka_ids`, lalu status menjadi `DIKIRIM_KE_WAKA`.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KonfirmasiTUSuratMasukRequest'
      responses:
        '200':
          description: Konfirmasi TU berhasil.
          content:
            application/json:
              example:
                success: true
                message: Konfirmasi TU berhasil diproses
                data:
                  id: 1
                  status_alur: DIKIRIM_KE_WAKA
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/surat-masuk/{id}/kirim-ke-user:
    post:
      tags: [Surat Masuk]
      summary: Waka kirim Surat Masuk ke penerima
      description: "Role: Waka. `catatan` wajib."
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KirimKeUserRequest'
      responses:
        '200':
          description: Surat dikirim ke penerima.
          content:
            application/json:
              example:
                success: true
                message: Surat berhasil dikirim ke penerima
                data:
                  id: 1
                  status_alur: DIKIRIM_KE_USER
        '400':
          description: Catatan Waka wajib.
          content:
            application/json:
              example:
                success: false
                message: Catatan Wakil Kepala Sekolah wajib diisi

  /api/surat-masuk/{id}/konfirmasi-penerimaan:
    post:
      tags: [Surat Masuk]
      summary: User konfirmasi penerimaan Surat Masuk
      description: "Role: User penerima surat."
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Penerimaan dikonfirmasi.
          content:
            application/json:
              example:
                success: true
                message: Penerimaan surat berhasil dikonfirmasi
                data:
                  id: 1
                  status: DITERIMA_USER
                  status_alur: SELESAI
        '403':
          $ref: '#/components/responses/BadRequest'

  /api/surat-masuk/{id}/pages:
    get:
      tags: [Preview]
      summary: List image preview Surat Masuk
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Daftar halaman preview.
          content:
            application/json:
              example:
                success: true
                message: Data berhasil diambil
                data:
